{{- range .Values.providers }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  namespace: {{ $.Values.models.namespace }}
  labels:
    inference.networking.k8s.io/bbr-managed: "true"
    {{- include "llm-katan.labels" $ | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .apiKey | quote }}
{{- end }}
