apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "llm-katan.fullname" . }}-dashboard
  namespace: {{ .Values.models.namespace }}
  labels:
    {{- include "llm-katan.labels" . | nindent 4 }}
spec:
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
    destinationCACertificate: ""
  to:
    kind: Service
    name: {{ include "llm-katan.fullname" . }}
  port:
    targetPort: https
