apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "llm-katan.fullname" . }}-externalmodel-reader
  labels:
    {{- include "llm-katan.labels" . | nindent 4 }}
rules:
- apiGroups:
  - maas.opendatahub.io
  resources:
  - externalmodels
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "llm-katan.fullname" . }}-externalmodel-reader
  labels:
    {{- include "llm-katan.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "llm-katan.fullname" . }}-externalmodel-reader
subjects:
- kind: ServiceAccount
  name: rhods-dashboard
  namespace: redhat-ods-applications
