apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-katan.fullname" . }}
  namespace: {{ .Values.models.namespace }}
  labels:
    {{- include "llm-katan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.simulator.replicas }}
  selector:
    matchLabels:
      {{- include "llm-katan.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-katan.selectorLabels" . | nindent 8 }}
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
      - name: llm-katan
        image: {{ .Values.simulator.image }}
        env:
        - name: HOME
          value: /tmp
        - name: PIP_CACHE_DIR
          value: /tmp/.cache/pip
        command:
        - sh
        - -c
        - |
          pip install --quiet --user llm-katan cryptography && \
          export PATH="/tmp/.local/bin:$PATH" && \
          llm-katan \
            --model {{ .Values.simulator.model }} \
            --backend {{ .Values.simulator.backend }} \
            --port {{ .Values.simulator.port }} \
            --providers {{ .Values.simulator.providers }} \
            {{- if .Values.simulator.tls }}
            --tls-cert /tls/tls.crt \
            --tls-key /tls/tls.key \
            {{- end }}
            {{- if .Values.simulator.validateKeys }}
            --validate-keys \
            {{- end }}
            --max-concurrent 10
        ports:
        - name: {{ if .Values.simulator.tls }}https{{ else }}http{{ end }}
          containerPort: {{ .Values.simulator.port }}
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.simulator.port }}
            scheme: {{ if .Values.simulator.tls }}HTTPS{{ else }}HTTP{{ end }}
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.simulator.port }}
            scheme: {{ if .Values.simulator.tls }}HTTPS{{ else }}HTTP{{ end }}
          initialDelaySeconds: 30
          periodSeconds: 30
        {{- if .Values.simulator.tls }}
        volumeMounts:
        - name: serving-cert
          mountPath: /tls
          readOnly: true
        {{- end }}
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      {{- if .Values.simulator.tls }}
      volumes:
      - name: serving-cert
        secret:
          secretName: {{ include "llm-katan.fullname" . }}-serving-cert
      {{- end }}
